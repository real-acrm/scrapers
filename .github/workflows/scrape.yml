name: Scrape

# 6-week cycle, 2 runs/week, ~56h apart, anchor hour drifting +4h each week so
# the 12 ticks cover the full 24h clock for diverse price snapshots. Weekends
# excluded. All 6 scrapers run together (matrix sequential, max-parallel: 1).
#
# Cycle table (UTC):
#   wk 0: Mon 00:00, Wed 08:00
#   wk 1: Mon 04:00, Wed 12:00
#   wk 2: Mon 08:00, Wed 16:00
#   wk 3: Mon 12:00, Wed 20:00
#   wk 4: Mon 16:00, Thu 00:00
#   wk 5: Mon 20:00, Thu 04:00
#
# GitHub Actions cron cannot filter by cycle-week, so all 12 ticks are listed
# below and the `gate` step exits early when the firing cron doesn't match the
# current cycle week. Net: 12 fires/week, 10 no-op exits, 2 real runs.
on:
  schedule:
    # cycle week 0
    - cron: "0 0 * * 1"
    - cron: "0 8 * * 3"
    # cycle week 1
    - cron: "0 4 * * 1"
    - cron: "0 12 * * 3"
    # cycle week 2
    - cron: "0 8 * * 1"
    - cron: "0 16 * * 3"
    # cycle week 3
    - cron: "0 12 * * 1"
    - cron: "0 20 * * 3"
    # cycle week 4
    - cron: "0 16 * * 1"
    - cron: "0 0 * * 4"
    # cycle week 5
    - cron: "0 20 * * 1"
    - cron: "0 4 * * 4"
  workflow_dispatch:
    inputs:
      scraper:
        description: "Which scraper to run (or 'all')"
        type: choice
        default: "all"
        options:
          - all
          - naleo
          - kajasport
          - goldensneakers
          - brandsdistribution
          - buy2bee
          - brandsgateway
          - oversoles
          - griffati

jobs:
  scrape:
    runs-on: ubuntu-latest
    name: scrape (${{ matrix.scraper }})
    strategy:
      fail-fast: false
      # Scrapers run one at a time against the shared db. The order below is
      # the execution sequence — small/fast ones first, brandsgateway (biggest)
      # mid-run while the DB is warm but not heavily loaded yet.
      max-parallel: 1
      matrix:
        scraper:
          - goldensneakers
          - buy2bee
          - brandsgateway
          - brandsdistribution
          - kajasport
          - naleo
          - oversoles
          - griffati
    steps:
      - name: Gate
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.scraper }}" = "all" ] || [ "${{ github.event.inputs.scraper }}" = "${{ matrix.scraper }}" ]; then
              echo "run=true" >> "$GITHUB_OUTPUT"
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
              echo "Manual dispatch selected '${{ github.event.inputs.scraper }}'; skipping ${{ matrix.scraper }}."
            fi
            exit 0
          fi
          CRON="${{ github.event.schedule }}"
          # Days since Mon 1970-01-05 (canonical week-0 Monday).
          DAYS=$(( ($(date -u +%s) / 86400) - 4 ))
          WEEK=$(( DAYS / 7 ))
          CYCLE_WEEK=$(( WEEK % 6 ))
          case "$CYCLE_WEEK" in
            0) EXPECTED="0 0 * * 1|0 8 * * 3" ;;
            1) EXPECTED="0 4 * * 1|0 12 * * 3" ;;
            2) EXPECTED="0 8 * * 1|0 16 * * 3" ;;
            3) EXPECTED="0 12 * * 1|0 20 * * 3" ;;
            4) EXPECTED="0 16 * * 1|0 0 * * 4" ;;
            5) EXPECTED="0 20 * * 1|0 4 * * 4" ;;
          esac
          if [[ "|$EXPECTED|" == *"|$CRON|"* ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Cycle week $CYCLE_WEEK active; cron '$CRON' matches — running."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Cycle week $CYCLE_WEEK expects '$EXPECTED'; cron '$CRON' does not match — skipping."
          fi

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: npm install

      - name: Install Playwright browsers
        if: steps.gate.outputs.run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run scraper (${{ matrix.scraper }})
        if: steps.gate.outputs.run == 'true'
        env:
          NALEO_LOGIN: ${{ secrets.NALEO_LOGIN }}
          NALEO_PASSWORD: ${{ secrets.NALEO_PASSWORD }}
          KAJA_LOGIN: ${{ secrets.KAJA_LOGIN }}
          KAJA_PASSWORD: ${{ secrets.KAJA_PASSWORD }}
          GOLDENSNEAKERS_LOGIN: ${{ secrets.GOLDENSNEAKERS_LOGIN }}
          GOLDENSNEAKERS_PASSWORD: ${{ secrets.GOLDENSNEAKERS_PASSWORD }}
          BRANDSDISTRIBUTION_LOGIN: ${{ secrets.BRANDSDISTRIBUTION_LOGIN }}
          BRANDSDISTRIBUTION_PASSWORD: ${{ secrets.BRANDSDISTRIBUTION_PASSWORD }}
          BUY2BEE_LOGIN: ${{ secrets.BUY2BEE_LOGIN }}
          BUY2BEE_PASSWORD: ${{ secrets.BUY2BEE_PASSWORD }}
          BRANDSGATEWAY_LOGIN: ${{ secrets.BRANDSGATEWAY_LOGIN }}
          BRANDSGATEWAY_MEILI_HOST: ${{ secrets.BRANDSGATEWAY_MEILI_HOST }}
          BRANDSGATEWAY_MEILI_TOKEN: ${{ secrets.BRANDSGATEWAY_MEILI_TOKEN }}
          BRANDSGATEWAY_MODE: full
          OVERSOLES_LOGIN: ${{ secrets.OVERSOLES_LOGIN }}
          OVERSOLES_PASSWORD: ${{ secrets.OVERSOLES_PASSWORD }}
          OVERSOLES_SESSION_B64: ${{ secrets.OVERSOLES_SESSION_B64 }}
          GRIFFATI_LOGIN: ${{ secrets.GRIFFATI_LOGIN }}
          GRIFFATI_PASSWORD: ${{ secrets.GRIFFATI_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: xvfb-run --auto-servernum --server-args='-screen 0 1280x800x24' npm run scrape -- ${{ matrix.scraper }}
